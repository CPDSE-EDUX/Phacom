<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phacom – Pharma Code Companion</title>
    <link rel="icon" type="image/svg+xml" href="assets/Phacom.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-left">
                <img src="assets/Phacom.png" alt="Phacom logo" class="header-logo">
                <div>
                    <h1>Phacom</h1>
                    <p class="tagline">Pharma Code Companion</p>
                    <p class="subtitle">by <a href="https://cpdse.dk" target="_blank" rel="noopener">Center for Pharmaceutical Data Science Education</a></p>
                </div>
            </div>
            <a href="https://github.com/CPDSE-EDUX/Phacom" target="_blank" rel="noopener" class="header-github" title="View on GitHub">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            </a>
        </header>

        <!-- API Key Setup -->
        <div id="setup-panel">
            <div class="setup-card">
                <h2>Connect to an AI</h2>
                <p>Choose a provider and enter your API key to get started.</p>
                <div class="form-group">
                    <label for="provider-select">Provider</label>
                    <select id="provider-select">
                        <option value="gemini">Google Gemini</option>
                        <option value="mistral">Mistral AI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="api-key-input">API Key</label>
                    <input type="password" id="api-key-input" placeholder="Paste your API key here">
                </div>
                <button id="connect-btn">Connect</button>
                <p id="setup-error" class="error" hidden></p>
                <div class="setup-help">
                    <p>Don't have an API key?</p>
                    <ul>
                        <li><a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Get a Gemini key</a></li>
                        <li><a href="https://console.mistral.ai/api-keys/" target="_blank" rel="noopener">Get a Mistral key</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Chat Interface -->
        <div id="chat-panel" hidden>
            <div id="chat-messages"></div>
            <div id="file-preview" hidden>
                <span id="file-name"></span>
                <button id="file-remove" title="Remove file">&times;</button>
            </div>
            <div id="chat-input-area">
                <input type="file" id="file-input" hidden accept=".py,.r,.R,.qmd,.rmd,.Rmd,.txt,.csv,.json,.html,.md,.ipynb,.sas,.do,.yml,.yaml,.toml,.cfg,.ini,.sh,.bat,.sql,.xml">
                <button id="attach-btn" title="Upload a file">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </button>
                <textarea id="chat-input" placeholder="Ask me about Python or R…" rows="1"></textarea>
                <button id="send-btn" title="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div id="chat-footer">
                <span id="provider-badge"></span>
                <button id="disconnect-btn">Disconnect</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
